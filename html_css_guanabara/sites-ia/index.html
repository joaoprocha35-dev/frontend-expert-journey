<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Shop Pro</title>
<style>
    /* ===== RESET ===== */
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
    body{background:#111; color:#fff; overflow-x:hidden;}

/* ===== FUNDO ANIMADO ===== */
body::before{
    content:"";
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:linear-gradient(270deg,#ff4081,#6a11cb,#00c6ff,#ff4081);
    background-size:800% 800%;
    z-index:-1;
    animation:gradientBG 20s ease infinite;
}
@keyframes gradientBG{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* ===== HEADER ===== */
header{
    position:fixed;
    top:0; left:0; width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 50px;
    background:rgba(0,0,0,0.7);
    z-index:100;
}
header h1{font-size:2rem;color:#fff;cursor:pointer;}
nav ul{display:flex; list-style:none; gap:30px;}
nav ul li{position:relative; cursor:pointer;}
nav ul li ul{
    display:none; position:absolute; top:30px; left:0; background:rgba(0,0,0,0.8); padding:10px; border-radius:8px;
}
nav ul li:hover > ul{display:block;}
nav ul li ul li{margin:5px 0;}

/* ===== CARROSSEL ===== */
.carrossel-container{
    margin-top:100px;
    max-width:1000px;
    height:400px;
    margin-left:auto;margin-right:auto;
    position:relative;
    overflow:hidden;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.5);
}
.carrossel-slides{display:flex;transition:0.7s ease-in-out;}
.carrossel-slide{
    min-width:100%;
    background-size:cover;
    background-position:center;
}
.carrossel-btn{
    position:absolute; top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.5);
    color:#fff; border:none;
    font-size:2rem; padding:10px 15px;
    cursor:pointer; border-radius:50%; z-index:10;
}
#prev{left:20px;}
#next{right:20px;}

/* ===== SECAO PRODUTOS ===== */
main{max-width:1200px;margin:50px auto;padding:0 20px;}
h2{margin-bottom:20px; color:#ff4081; opacity:0; transform:translateY(50px); transition:0.8s;}
.produtos-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}
.produto-card{
    background:rgba(255,255,255,0.1);
    border-radius:12px;
    overflow:hidden;
    text-align:center;
    padding-bottom:10px;
    transition:transform 0.3s, box-shadow 0.3s, opacity 0.8s;
    opacity:0;
}
.produto-card img{width:100%;height:250px; object-fit:cover;}
.produto-card h3{margin:10px 0;}
.produto-card button{
    margin:10px; padding:10px 15px;
    background:#ff4081; color:#fff; border:none; border-radius:8px;
    cursor:pointer; transition:background 0.2s;
}
.produto-card button:hover{background:#e91e63;}

/* ===== MODAL ===== */
.modal{
    display:none;
    position:fixed;
    top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center; align-items:center;
    z-index:200;
}
.modal-content{
    background:#111; padding:20px;
    border-radius:12px;
    max-width:600px; width:90%; text-align:center;
    color:#fff;
    position:relative;
}
.modal-content img{width:100%; height:300px; object-fit:cover; margin-bottom:15px;}
.close-modal{
    position:absolute; top:10px; right:15px;
    font-size:1.5rem; cursor:pointer;
    color:#ff4081;
}

/* ===== FOOTER ===== */
footer{margin-top:50px;text-align:center;padding:20px 0;background:rgba(0,0,0,0.7);color:#fff;}
</style>
</head>
<body>

<header>
    <h1>Fashion Pro</h1>
    <nav>
        <ul>
            <li>Início</li>
            <li>Produtos
                <ul>
                    <li>Masculino</li>
                    <li>Feminino</li>
                    <li>Acessórios</li>
                </ul>
            </li>
            <li>Promoções</li>
            <li>Contato</li>
        </ul>
    </nav>
</header>

<!-- CARROSSEL -->
<div class="carrossel-container">
    <div class="carrossel-slides">
        <div class="carrossel-slide" style="background-image:url('https://picsum.photos/id/1011/1000/400')"></div>
        <div class="carrossel-slide" style="background-image:url('https://picsum.photos/id/1012/1000/400')"></div>
        <div class="carrossel-slide" style="background-image:url('https://picsum.photos/id/1013/1000/400')"></div>
    </div>
    <button class="carrossel-btn" id="prev">&#10094;</button>
    <button class="carrossel-btn" id="next">&#10095;</button>
</div>

<main>
    <h2>Produtos em Destaque</h2>
    <div class="produtos-grid">
        <div class="produto-card" data-nome="Camiseta Casual" data-preco="79,90" data-imagem="https://picsum.photos/id/1025/400/400">
            <img src="https://picsum.photos/id/1025/400/400" alt="Camiseta">
            <h3>Camiseta Casual</h3>
            <button>Ver Detalhes</button>
        </div>
        <div class="produto-card" data-nome="Jaqueta Estilo" data-preco="199,90" data-imagem="https://picsum.photos/id/1020/400/400">
            <img src="https://picsum.photos/id/1020/400/400" alt="Jaqueta">
            <h3>Jaqueta Estilo</h3>
            <button>Ver Detalhes</button>
        </div>
        <div class="produto-card" data-nome="Calça Moderna" data-preco="149,90" data-imagem="https://picsum.photos/id/1027/400/400">
            <img src="https://picsum.photos/id/1027/400/400" alt="Calça">
            <h3>Calça Moderna</h3>
            <button>Ver Detalhes</button>
        </div>
        <div class="produto-card" data-nome="Tênis Casual" data-preco="299,90" data-imagem="https://picsum.photos/id/1031/400/400">
            <img src="https://picsum.photos/id/1031/400/400" alt="Tênis">
            <h3>Tênis Casual</h3>
            <button>Ver Detalhes</button>
        </div>
    </div>
</main>

<!-- CARROSSEL -->
<div class="carrossel-container">
    <div class="carrossel-slides">
        <div class="carrossel-slide" style="background-image:url('https://images.unsplash.com/photo-1600185363582-5be0e5c77c7f?auto=format&fit=crop&w=1000&q=80')"></div>
        <div class="carrossel-slide" style="background-image:url('https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?auto=format&fit=crop&w=1000&q=80')"></div>
        <div class="carrossel-slide" style="background-image:url('https://images.unsplash.com/photo-1618354691003-f6c2c11a7b42?auto=format&fit=crop&w=1000&q=80')"></div>
    </div>
    <button class="carrossel-btn" id="prev">&#10094;</button>
    <button class="carrossel-btn" id="next">&#10095;</button>
</div>

<footer>
    <p>© 2026 Fashion Pro - Todos os direitos reservados</p>
</footer>

<script>
    // ===== CARROSSEL =====
    const slides = document.querySelector('.carrossel-slides');
    const totalSlides = document.querySelectorAll('.carrossel-slide').length;
    let slideIndex = 0;

    function showSlide(index){
        slides.style.transform = `translateX(-${index*100}%)`;
    }

    document.getElementById('next').addEventListener('click',()=>{
        slideIndex=(slideIndex+1)%totalSlides; showSlide(slideIndex);
    });
    document.getElementById('prev').addEventListener('click',()=>{
        slideIndex=(slideIndex-1+totalSlides)%totalSlides; showSlide(slideIndex);
    });
    setInterval(()=>{
        slideIndex=(slideIndex+1)%totalSlides; showSlide(slideIndex);
    },5000);

    // ===== MODAL PRODUTO =====
    const modal=document.getElementById('modalProduto');
    const modalImg=document.getElementById('modal-img');
    const modalNome=document.getElementById('modal-nome');
    const modalPreco=document.getElementById('modal-preco');
    const closeModal=document.querySelector('.close-modal');

    document.querySelectorAll('.produto-card button').forEach(btn=>{
        btn.addEventListener('click',()=>{
            const card=btn.parentElement;
            modalImg.src=card.dataset.imagem;
            modalNome.textContent=card.dataset.nome;
            modalPreco.textContent="R$ "+card.dataset.preco;
            modal.style.display='flex';
        });
    });

    closeModal.addEventListener('click',()=>modal.style.display='none');
    window.addEventListener('click',e=>{
        if(e.target===modal) modal.style.display='none';
    });

    // ===== SCROLL REVEAL =====
    const faders=document.querySelectorAll('h2, .produto-card');
    function checkScroll(){
        const triggerBottom=window.innerHeight*0.85;
        faders.forEach(el=>{
            const box=el.getBoundingClientRect();
            if(box.top<triggerBottom){el.style.opacity=1; el.style.transform='translateY(0)';}
        });
    }
    window.addEventListener('scroll',checkScroll);
    window.addEventListener('load',checkScroll);
</script>

</body>
</html>
