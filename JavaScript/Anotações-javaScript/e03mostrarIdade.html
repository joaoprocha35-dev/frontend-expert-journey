<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
           background-color: black;
           height: 100vh;
           display: flex;
           justify-content: center;
           align-items: center;
        }
        button{
            color: aliceblue;
            background-color: green;
            font-size: 20px;
            height: 40px;
            width: 120px;
            border-radius: 10px;
            text-align: center;
        }
        p{
            min-height: 40px;
            width: 120px;
            color:white;
            font-size: 20px;
            background-color: green;
            border-radius: 10px;
            text-align: center;
            padding: 10px;
        }
        .container{
            min-height: 250px;
            min-width: 200px;
            padding: 20px;
            border: 3px solid white;
            border-radius: 25px;
        }
    </style>
</head>
<body>
    <div class="container">

    <button id="btn">Resultado</button>
    <p id="res">Resultado</p>
</div>
    <script>
        var botao = document.querySelector("#btn")
        var resultado = document.querySelector("#res")
        botao.addEventListener("click",mostrarIdade)

        function mostrarIdade(){

        var nome = String(prompt("Digite seu nome: "))
        var anoAtual = Number(prompt("Em que ano nós estamos?"))
        var anoNascimento = Number(prompt("Em que ano você nasceu?"))

        var idade = anoAtual - anoNascimento
        
        res.innerHTML = (`${nome} tem ${idade} de Idade! <br> Parabéns por descobrir sua idade`)
        
        }

    </script>

</body>
</html>
