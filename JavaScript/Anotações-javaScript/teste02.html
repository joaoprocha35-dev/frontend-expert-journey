<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: black;
        }

        input {
            height: 30px;
            width: 150x;
            border: 2px solid red;
            font-size: 22px;
            border-radius: 5px;
        }

        p,
        h1,
        label {
            font-size: 25px;
            color: aliceblue;
        }

        button {
            height: 50px;
            width: 100px;
            background-color: rgb(0, 0, 0);
            font-size: 20px;
            border-radius: 10px;
            border: 2px solid rgb(255, 0, 0);
            color: aliceblue;
        }
    </style>
</head>

<body>

    <input type="number" id="nascimento" placeholder="Ano de Nascimento">
    <input type="number" id="anoAtual" placeholder="Ano de Atual">

    <button id="btn1">Mostrar idade</button>

    <p id="res"></p>

    <script>

        var botao = document.querySelector("#btn1")
        botao.addEventListener("click", mostrarIdade)

        function mostrarIdade(){
            var box1 = document.querySelector("#nascimento")
            var box2 = document.querySelector("#anoAtual")
            var n1 = Number(box1.value)
            var n2= Number(box2.value)
            var resultado = document.querySelector("#res")

            var soma = n2 - n1

            resultado.innerHTML = `Você tem ${soma} anos de idade:`
        }
    </script>

</body>

</html>
