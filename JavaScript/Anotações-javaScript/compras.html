<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    button{
        height: 30px;
        width: 120px;
        background-color: green;
        color: black;
        padding: 10px;
        border-radius: 10px;
    }
</style>
<body>



    <script>
         
        var valor = Number(window.prompt("Digite o valor dos produtos"))
        var imposto = Number(window.prompt("Digite o valor do imposto"))
        var resultado = (valor * imposto) / 100
        var total = valor + resultado
        window.alert(`Valor do imposto: ${resultado.toLocaleString("pt-br", {style: "currency", currency: "BRL"})}.Valor total a pagar ${total.toLocaleString("pt-br", {style: "currency", currency: "BRL"})} `)

    </script>
</body>
</html>
