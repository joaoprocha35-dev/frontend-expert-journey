<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        input{
            height: 30px;
            width: 120px;
            border: 3px solid black;
            margin-bottom:20px;
        }
        .res{
            height: 30px;
            width: 100px;
            border: 3px solid black;
            font-size: 20px;
            padding: 10px;
            text-align: center;
        }
        
    </style>
</head>
<body>

    <input type="number" name="box1" id="box1" placeholder="Digite um número">
    <input type="number" name="box2" id="box2" placeholder="Digite um número">
    <input type="button" value="Somar" id="buttom" onclick="somar()">
    <div id="res" class="res">
       <p>Resultado</p>
    </div>
    <script>
        function somar(){
            var caixa1 = document.getElementById("box1")
            var caixa2 = document.getElementById("box2")
            var num1 = Number.parseFloat(caixa1.value)
            var num2 = Number.parseFloat(caixa2.value)
            var resultado = document.getElementById("res")
            var soma = num1 + num2
            resultado.innerHTML = soma
        }
    </script>
</body>
</html>
