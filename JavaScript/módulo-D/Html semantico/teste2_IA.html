<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza UI</title>
</head>

<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-size: 30px;
    font-family: Arial, Helvetica, sans-serif;
}

:root {
    --bg-main: #0b0f1a;
    --bg-card: rgba(255,255,255,0.05);

    --primary-blue: #4facfe;
    --primary-purple: #7b2ff7;
    --primary-pink: #ff4ecd;

    --text-primary: #e4e4e7;
    --text-secondary: #a1a1aa;
}

body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    background:
        radial-gradient(circle at 20% 30%, rgba(79,172,254,0.2), transparent),
        radial-gradient(circle at 80% 70%, rgba(255,78,205,0.2), transparent),
        var(--bg-main);
}

/* TEXTO COM DEGRADÊ */
h1, p {
    background: linear-gradient(90deg, var(--primary-blue), var(--primary-purple), var(--primary-pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* HEADER */
header {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 10vh;
}

/* MAIN */
main {
    display: flex;
    flex: 1;
    justify-content: center;
    align-items: center;

    background-size: 200% 200%;
    animation: bgMove 10s ease infinite;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* CARD PRINCIPAL */
.pizza {
    display: flex;
    flex-direction: column;
    gap: 30px;
    padding: 30px;
    width: 100%;
    max-width: 700px;

    background: var(--bg-card);
    backdrop-filter: blur(20px);

    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);

    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

/* TITLE */
.title {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 10px;
}

/* FATIAS */
.fatias {
    display: flex;
    gap: 20px;
}

/* CARDS INTERNOS */
.fatiaA,
.fatiaB {
    flex: 1;
    padding: 30px;
    text-align: center;

    border-radius: 15px;
    border: 1px solid rgba(255,255,255,0.1);

    background: linear-gradient(135deg, #1a1f3a, #1f2a5c);
    color: var(--text-primary);

    transition: all 0.3s ease;
}

/* HOVER DIFERENTE */
.fatiaA:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 20px rgba(79,172,254,0.5);
}

.fatiaB:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 20px rgba(255,78,205,0.5);
}

/* FOOTER */
footer {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 10vh;
}
</style>

<body>

    <header>
        <h1>Minha Pizza</h1>
    </header>

    <main>
        <img src="" alt="">
        <section class="pizza">

            <div class="title">
                <h1>Pizza</h1>
                <p>Escolha a pizza</p>
            </div>

            <div class="fatias">
                <div class="fatiaA">Fatia 1</div>
                <div class="fatiaB">Fatia 2</div>
            </div>

        </section>
    </main>

    <footer>
        <p>Rodapé</p>
    </footer>

</body>
</html>
