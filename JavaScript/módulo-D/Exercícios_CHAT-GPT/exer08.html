    <script>
        //Pegar os botoes 
        var b1 = document.querySelector("#btn1")
        var b2 = document.querySelector("#btn2")

        //Criando uma váriavel de estado
        var usuarioSalvo = ""
        var senhaSalva = 0
         //Adicionando evento nos dois botoes
        b1.addEventListener("click", salvarCadastro)
        b2.addEventListener("click", validacaoLogin)

        //Chamar a primeira funcao de salvarCadastro
        function salvarCadastro(){
            //Pegando os input
            var box1 = document.querySelector("#usuarioCadastro")
            var box2 = document.querySelector("#senhaCadastro")
            var r = document.querySelector("#res1")
            var u = String(box1.value)
            var s = Number(box2.value)

            if ( u !== "" && s !== 0){
                usuarioSalvo = u
                senhaSalva = s
                r.innerHTML = "Cadastro salvo, preencha o login agora lindao." 
            } else {
                r.innerHTML = "Preencha o formulario antes de ir para o login cabecao!"
            }
        }
            function validacaoLogin() {
                var box3 = document.querySelector("#usuario")
                var box4 = document.querySelector("#senha")
                var r2 = document.querySelector("#res2")
                var u2 = String(box3.value)
                var s2 = Number(box4.value)

                if (u2 === usuarioSalvo && s2 === senhaSalva ) {
                    r2.innerHTML = "Login correto"
                } else {
                    r2.innerHTML = "Senha ou nome de usúario incorreto cabeção!"
                }
            }
    </script>
