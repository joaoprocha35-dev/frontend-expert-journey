<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Moderna</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e1e2f, #4e54c8);
            color: white;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 100%;
            max-width: 450px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 10px;
        }

        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            height: 50px;
            border-radius: 10px;
            border: none;
            padding: 10px;
            font-size: 1rem;
            text-align: center;
            outline: none;
        }

        input:focus, select:focus {
            box-shadow: 0 0 10px #4e54c8;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .res-box {
            background-color: rgba(255, 255, 255, 0.2);
            margin: 20px 0;
            padding: 20px;
            border-radius: 10px;
            min-height: 70px;
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            word-break: break-all;
        }

        button {
            width: 100%;
            height: 60px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            transition: transform 0.2s, background-color 0.3s;
        }

        button:hover {
            background-color: #27ae60;
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Calculadora</h1>

        <div class="input-group">
            <input type="number" id="num1" placeholder="Número 1">
            <input type="number" id="num2" placeholder="Número 2">
        </div>

        <label for="opcoes">Escolha a Operação:</label>
        <select id="opcoes">
            <option value="1">Soma (+)</option>
            <option value="2">Subtração (-)</option>
            <option value="3">Multiplicação (x)</option>
            <option value="4">Divisão (÷)</option>
            <option value="5">Resto (%)</option>
        </select>

        <div id="res1" class="res-box"> ---</div>

        <button id="btn1">Calcular Agora</button>
    </div>

    <script>
        const btn = document.querySelector("#btn1");
        const resDisplay = document.querySelector("#res1");

        btn.addEventListener("click", () => {
            const n1 = Number(document.querySelector("#num1").value);
            const n2 = Number(document.querySelector("#num2").value);
            const operacao = document.querySelector("#opcoes").value;
            
            let resultado;

            switch (operacao) {
                case "1": resultado = n1 + n2; break;
                case "2": resultado = n1 - n2; break;
                case "3": resultado = n1 * n2; break;
                case "4": 
                    resultado = n2 !== 0 ? (n1 / n2).toFixed(2) : "Erro (Div/0)"; 
                    break;
                case "5": resultado = n1 % n2; break;
                default: resultado = "Operação Inválida";
            }

            resDisplay.innerHTML = `Resultado: ${resultado}`;
        });
    </script>

</body>
</html>
