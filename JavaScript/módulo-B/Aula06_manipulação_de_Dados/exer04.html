<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatando String</title>
    <style>
        body{
        
            background-color: rgb(0, 200, 255);
            font-family: "Arial";
        }
        h1{
            color: blue;
        }
        h2{
            font-size: 50px;
            color: rgb(255, 0, 0);
        }
      
    </style>
</head>
<body>
    <script>
        var nome = window.prompt("Qual seu nome? ")
        document.write("<h1>Comando para saber quantra  letras tem um texto.</h1> <br><br>")
        document.write(`<h2> Olá, <strong> ${nome}.</strong> Seu nome tem  ${nome.length} letras. </h2> <br> `)

        document.write(`<h2> Seu nome  em maiúsculas é  <Strong>${nome.toUpperCase()}.</Strong> </h2>`)
        document.write(`<h2>Seu nome em maiúsculo é: <Strong> ${nome.toLocaleLowerCase()} </Strong> </h2>  `)

    </script>
</body>
</html>
