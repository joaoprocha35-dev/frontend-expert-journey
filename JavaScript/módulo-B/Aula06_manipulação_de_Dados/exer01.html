<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>manipulaçao_de_Dados</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-shadow: 0;
        }
        body{
            font-size: 30px;
            color: blue;
        }

    
    </style>
</head>

<body>
    <div id="container01">
        <h1>Olá mundo!</h1>
    </div>

    <script>
       var nome = prompt("Nome do Estudante:")
       var curso = prompt("Curso? ")
       window.alert("Aperte em ok para confirmar: ")
       document.write("Seja bem-vindo ", nome,"!", 
        "Curso escolhido: ", curso,".")
       
    </script>
</body>

</html>
